services:
  worker:
    image: node:20
    working_dir: /app
    command: sh -lc "apt-get update && apt-get install -y poppler-utils tesseract-ocr tesseract-ocr-ind unzip libreoffice && corepack enable && pnpm install && pnpm dev:worker"
    volumes:
      - ./:/app
      - ./data:/app/data
    env_file:
      - .env
  web:
    image: node:20
    working_dir: /app
    command: sh -lc "corepack enable && pnpm install && pnpm dev:web"
    ports:
      - "3000:3000"
    volumes:
      - ./:/app
    env_file:
      - .env
